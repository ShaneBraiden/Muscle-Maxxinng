<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Silk Fitness - Exercise Picker</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-primary-fixed-variant": "#4338ca",
                        "on-secondary-fixed-variant": "#404252",
                        "inverse-surface": "#2e3040",
                        "tertiary-container": "#a78bfa",
                        "secondary-fixed-dim": "#b8baca",
                        "on-primary-container": "#e0e2ff",
                        "primary-fixed-dim": "#a5b4fc",
                        "on-primary": "#ffffff",
                        "on-tertiary-fixed-variant": "#5b21b6",
                        "on-tertiary-fixed": "#2e1065",
                        "error-container": "#fee2e2",
                        "tertiary-fixed": "#ede9fe",
                        "primary-container": "#818cf8",
                        "surface-dim": "#d4d6dc",
                        "surface-container": "#e2e4ea",
                        "inverse-on-surface": "#e8eaf0",
                        "surface-variant": "#dcdee4",
                        "surface-container-highest": "#d6d8de",
                        "on-surface": "#2e3040",
                        "surface-bright": "#edeef4",
                        "on-background": "#2e3040",
                        "tertiary": "#7c3aed",
                        "inverse-primary": "#a5b4fc",
                        "primary-fixed": "#e0e2ff",
                        "on-tertiary-container": "#3b1f63",
                        "error": "#dc2626",
                        "on-surface-variant": "#585a68",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "background": "#e8eaf0",
                        "secondary": "#6c6e7e",
                        "secondary-container": "#d8dae6",
                        "outline-variant": "#d0d2dc",
                        "surface-container-lowest": "#f0f2f8",
                        "surface": "#e8eaf0",
                        "tertiary-fixed-dim": "#c4b5fd",
                        "surface-container-high": "#dcdee4",
                        "surface-container-low": "#e5e7ed",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#991b1b",
                        "secondary-fixed": "#d8dae6",
                        "primary": "#6366f1",
                        "on-secondary-container": "#585a68",
                        "surface-tint": "#6366f1",
                        "on-primary-fixed": "#1e1b4b",
                        "outline": "#8a8c9a",
                        "on-secondary-fixed": "#1a1b26"
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                }
            }
        }
    </script>
<style>
        .neo-raised {
            box-shadow: 6px 6px 12px rgba(0,0,0,0.08), -6px -6px 12px rgba(255,255,255,0.6);
        }
        .neo-pressed {
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.06), inset -4px -4px 8px rgba(255,255,255,0.5);
        }
        .neo-raised-sm {
            box-shadow: 4px 4px 8px rgba(0,0,0,0.08), -4px -4px 8px rgba(255,255,255,0.6);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body h-screen w-full flex flex-col items-center justify-end overflow-hidden relative">
<!-- Modal Backdrop -->
<div class="absolute inset-0 bg-on-background/20 backdrop-blur-sm z-40"></div>
<!-- Bottom Sheet Container -->
<div class="relative w-full max-w-md bg-surface h-[751px] rounded-t-[2rem] z-50 flex flex-col shadow-[0_-8px_24px_rgba(0,0,0,0.1)]">
<!-- Handle -->
<div class="w-full pt-4 pb-2 flex justify-center shrink-0">
<div class="w-12 h-1.5 rounded-full bg-outline-variant neo-pressed"></div>
</div>
<!-- Header area -->
<div class="px-6 py-2 shrink-0 flex items-center justify-between">
<h2 class="font-headline font-semibold text-xl text-on-surface">Add Exercises</h2>
<button class="text-primary font-medium text-sm flex items-center gap-1 active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-size: 18px;">add</span>
                Custom
            </button>
</div>
<!-- Search Bar -->
<div class="px-6 py-4 shrink-0">
<div class="relative w-full neo-pressed rounded-xl bg-surface flex items-center px-4 py-3">
<span class="material-symbols-outlined text-outline mr-3">search</span>
<input class="w-full bg-transparent border-none focus:ring-0 p-0 text-on-surface placeholder:text-outline text-sm font-medium outline-none" placeholder="Search exercises..." type="text"/>
</div>
</div>
<!-- Filter Chips (Horizontal Scroll) -->
<div class="w-full overflow-x-auto no-scrollbar shrink-0 pb-4 px-6 flex gap-3">
<button class="whitespace-nowrap px-4 py-2 rounded-xl text-sm font-medium bg-surface text-primary neo-pressed">All</button>
<button class="whitespace-nowrap px-4 py-2 rounded-xl text-sm font-medium bg-surface text-on-surface-variant neo-raised active:neo-pressed transition-shadow">Push</button>
<button class="whitespace-nowrap px-4 py-2 rounded-xl text-sm font-medium bg-surface text-on-surface-variant neo-raised active:neo-pressed transition-shadow">Pull</button>
<button class="whitespace-nowrap px-4 py-2 rounded-xl text-sm font-medium bg-surface text-on-surface-variant neo-raised active:neo-pressed transition-shadow">Legs</button>
<button class="whitespace-nowrap px-4 py-2 rounded-xl text-sm font-medium bg-surface text-on-surface-variant neo-raised active:neo-pressed transition-shadow">Core</button>
</div>
<!-- Divider -->
<div class="w-full h-px bg-outline-variant/30 shrink-0"></div>
<!-- Exercise List (Scrollable) -->
<div class="flex-1 overflow-y-auto px-4 py-2 pb-24">
<!-- Exercise Item 1 (Selected) -->
<label class="flex items-center justify-between p-4 my-2 rounded-xl bg-surface neo-pressed cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface neo-raised flex items-center justify-center text-primary">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<div>
<h3 class="font-semibold text-on-surface text-sm">Barbell Bench Press</h3>
<p class="text-xs text-on-surface-variant mt-0.5">Chest • Barbell</p>
</div>
</div>
<div class="w-6 h-6 rounded bg-primary text-on-primary flex items-center justify-center neo-raised-sm">
<span class="material-symbols-outlined" style="font-size: 16px;">check</span>
</div>
<!-- Hidden Checkbox for actual form data if needed -->
<input checked="" class="hidden" type="checkbox"/>
</label>
<!-- Exercise Item 2 -->
<label class="flex items-center justify-between p-4 my-2 rounded-xl bg-surface hover:neo-pressed transition-shadow cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface neo-raised flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">accessibility_new</span>
</div>
<div>
<h3 class="font-semibold text-on-surface text-sm">Pull-up</h3>
<p class="text-xs text-on-surface-variant mt-0.5">Back • Bodyweight</p>
</div>
</div>
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center">
</div>
<input class="hidden" type="checkbox"/>
</label>
<!-- Exercise Item 3 -->
<label class="flex items-center justify-between p-4 my-2 rounded-xl bg-surface hover:neo-pressed transition-shadow cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface neo-raised flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">fitness_center</span>
</div>
<div>
<h3 class="font-semibold text-on-surface text-sm">Dumbbell Shoulder Press</h3>
<p class="text-xs text-on-surface-variant mt-0.5">Shoulders • Dumbbell</p>
</div>
</div>
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center">
</div>
<input class="hidden" type="checkbox"/>
</label>
<!-- Exercise Item 4 (Selected) -->
<label class="flex items-center justify-between p-4 my-2 rounded-xl bg-surface neo-pressed cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface neo-raised flex items-center justify-center text-primary">
<span class="material-symbols-outlined">directions_run</span>
</div>
<div>
<h3 class="font-semibold text-on-surface text-sm">Barbell Squat</h3>
<p class="text-xs text-on-surface-variant mt-0.5">Legs • Barbell</p>
</div>
</div>
<div class="w-6 h-6 rounded bg-primary text-on-primary flex items-center justify-center neo-raised-sm">
<span class="material-symbols-outlined" style="font-size: 16px;">check</span>
</div>
<input checked="" class="hidden" type="checkbox"/>
</label>
<!-- Exercise Item 5 -->
<label class="flex items-center justify-between p-4 my-2 rounded-xl bg-surface hover:neo-pressed transition-shadow cursor-pointer">
<div class="flex items-center gap-4">
<div class="w-10 h-10 rounded-full bg-surface neo-raised flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">sports_gymnastics</span>
</div>
<div>
<h3 class="font-semibold text-on-surface text-sm">Deadlift</h3>
<p class="text-xs text-on-surface-variant mt-0.5">Back • Barbell</p>
</div>
</div>
<div class="w-6 h-6 rounded border-2 border-outline-variant flex items-center justify-center">
</div>
<input class="hidden" type="checkbox"/>
</label>
</div>
<!-- Sticky Footer Action -->
<div class="absolute bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pt-12 pb-8 rounded-b-[2rem]">
<button class="w-full bg-surface py-4 rounded-xl flex items-center justify-center gap-2 neo-raised active:neo-pressed transition-all text-primary font-semibold">
<span>Add Exercises</span>
<span class="bg-primary text-on-primary text-xs w-5 h-5 rounded-full flex items-center justify-center ml-1">2</span>
</button>
</div>
</div>
</body></html>
