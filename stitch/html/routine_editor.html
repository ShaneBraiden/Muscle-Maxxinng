<!DOCTYPE html>

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background font-body text-on-surface min-h-screen pb-32 antialiased selection:bg-primary selection:text-on-primary">
<!-- Header / Nav Shell (Adapted for Transactional State) -->
<header class="flex justify-between items-center px-6 py-5 sticky top-0 bg-background/90 backdrop-blur-md z-40">
<button class="w-10 h-10 rounded-full bg-background flex items-center justify-center text-on-surface-variant shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] transition-all duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-on-surface">Edit Routine</h1>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-6 mt-4 space-y-10 max-w-md mx-auto">
<!-- Routine Name Input -->
<section>
<label class="block text-sm font-semibold text-on-surface-variant mb-3 px-2">Routine Name</label>
<input class="w-full bg-background border-none rounded-2xl px-5 py-4 text-on-surface font-semibold text-lg shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 placeholder:text-outline outline-none transition-shadow" type="text" value="Upper Body Power"/>
</section>
<!-- Day of Week Picker (Segmented Soft UI) -->
<section>
<label class="block text-sm font-semibold text-on-surface-variant mb-3 px-2">Active Days</label>
<div class="flex justify-between items-center bg-background rounded-2xl p-2 shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)]">
<!-- S -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-on-surface-variant font-medium hover:text-primary transition-colors">S</button>
<!-- M (Active) -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-primary font-bold shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] bg-background">M</button>
<!-- T -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-on-surface-variant font-medium hover:text-primary transition-colors">T</button>
<!-- W (Active) -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-primary font-bold shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] bg-background">W</button>
<!-- T -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-on-surface-variant font-medium hover:text-primary transition-colors">T</button>
<!-- F (Active) -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-primary font-bold shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] bg-background">F</button>
<!-- S -->
<button class="w-10 h-10 rounded-xl flex items-center justify-center text-on-surface-variant font-medium hover:text-primary transition-colors">S</button>
</div>
</section>
<!-- Exercises List -->
<section>
<div class="flex justify-between items-end mb-4 px-2">
<h2 class="text-sm font-semibold text-on-surface-variant">Exercises</h2>
<span class="text-xs font-medium text-primary">3 Items</span>
</div>
<div class="space-y-5">
<!-- Exercise Row 1 -->
<div class="bg-background rounded-2xl p-5 shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] flex gap-4 items-stretch group">
<div class="flex flex-col justify-center text-outline hover:text-on-surface-variant cursor-grab active:cursor-grabbing transition-colors">
<span class="material-symbols-outlined">drag_indicator</span>
</div>
<div class="flex-1 space-y-4">
<div class="flex justify-between items-center">
<h3 class="font-bold text-on-surface">Barbell Bench Press</h3>
<button class="w-8 h-8 rounded-full bg-background flex items-center justify-center text-error opacity-60 hover:opacity-100 shadow-[6px_6px_12px_rgba(0,0,0,0.05),-6px_-6px_12px_rgba(255,255,255,0.4)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] transition-all">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<div class="flex gap-3">
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Sets</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-primary font-bold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="4"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Reps</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-primary font-bold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="8"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Lbs</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-on-surface font-semibold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="185"/>
</div>
</div>
</div>
</div>
<!-- Exercise Row 2 -->
<div class="bg-background rounded-2xl p-5 shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] flex gap-4 items-stretch group">
<div class="flex flex-col justify-center text-outline hover:text-on-surface-variant cursor-grab active:cursor-grabbing transition-colors">
<span class="material-symbols-outlined">drag_indicator</span>
</div>
<div class="flex-1 space-y-4">
<div class="flex justify-between items-center">
<h3 class="font-bold text-on-surface">Incline Dumbbell Press</h3>
<button class="w-8 h-8 rounded-full bg-background flex items-center justify-center text-error opacity-60 hover:opacity-100 shadow-[6px_6px_12px_rgba(0,0,0,0.05),-6px_-6px_12px_rgba(255,255,255,0.4)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] transition-all">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<div class="flex gap-3">
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Sets</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-primary font-bold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="3"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Reps</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-primary font-bold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="10"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Lbs</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-on-surface font-semibold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="70"/>
</div>
</div>
</div>
</div>
<!-- Exercise Row 3 -->
<div class="bg-background rounded-2xl p-5 shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] flex gap-4 items-stretch group">
<div class="flex flex-col justify-center text-outline hover:text-on-surface-variant cursor-grab active:cursor-grabbing transition-colors">
<span class="material-symbols-outlined">drag_indicator</span>
</div>
<div class="flex-1 space-y-4">
<div class="flex justify-between items-center">
<h3 class="font-bold text-on-surface">Tricep Pushdown</h3>
<button class="w-8 h-8 rounded-full bg-background flex items-center justify-center text-error opacity-60 hover:opacity-100 shadow-[6px_6px_12px_rgba(0,0,0,0.05),-6px_-6px_12px_rgba(255,255,255,0.4)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] transition-all">
<span class="material-symbols-outlined text-[18px]">close</span>
</button>
</div>
<div class="flex gap-3">
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Sets</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-primary font-bold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="3"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Reps</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-primary font-bold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="12"/>
</div>
<div class="flex-1 flex flex-col gap-1.5">
<span class="text-[10px] uppercase tracking-wider text-on-surface-variant font-bold text-center">Lbs</span>
<input class="w-full text-center bg-background border-none rounded-xl py-2.5 text-on-surface font-semibold shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] focus:ring-0 outline-none" type="number" value="65"/>
</div>
</div>
</div>
</div>
</div>
</section>
<!-- Add Exercise Button -->
<button class="w-full py-4 rounded-2xl flex items-center justify-center gap-3 text-tertiary font-bold shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] bg-background transition-all duration-200 mt-6">
<span class="material-symbols-outlined">add_circle</span>
            Add Exercise
        </button>
</main>
<!-- Fixed Bottom Actions -->
<div class="fixed bottom-0 left-0 w-full bg-background/90 backdrop-blur-md px-6 py-5 pb-safe flex gap-4 max-w-md mx-auto right-0 z-50">
<button class="flex-1 py-4 rounded-2xl font-bold text-on-surface-variant shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] bg-background transition-all duration-200">
            Cancel
        </button>
<button class="flex-[1.5] py-4 rounded-2xl font-bold text-primary shadow-[6px_6px_12px_rgba(0,0,0,0.08),-6px_-6px_12px_rgba(255,255,255,0.6)] active:shadow-[inset_4px_4px_8px_rgba(0,0,0,0.06),inset_-4px_-4px_8px_rgba(255,255,255,0.5)] bg-background transition-all duration-200 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">save</span>
            Save Routine
        </button>
</div>
</body></html>
