<style type="text/tailwindcss">
        @layer utilities {
            .neo-raised {
                box-shadow: 6px 6px 12px rgba(0,0,0,0.08), -6px -6px 12px rgba(255,255,255,0.6);
            }
            .neo-inset {
                box-shadow: inset 4px 4px 8px rgba(0,0,0,0.06), inset -4px -4px 8px rgba(255,255,255,0.5);
            }
            .neo-surface {
                @apply bg-background;
            }
            .neo-border-radius {
                @apply rounded-2xl;
            }
        }

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body min-h-screen flex flex-col items-center justify-center p-6 antialiased">
<!-- Main Content Canvas -->
<main class="w-full max-w-md flex flex-col items-center justify-center flex-1">
<!-- App Identity -->
<div class="flex flex-col items-center mb-16">
<div class="w-24 h-24 neo-surface neo-raised rounded-full flex items-center justify-center mb-6">
<span class="material-symbols-outlined text-primary text-5xl" style="font-variation-settings: 'FILL' 1;">fitness_center</span>
</div>
<h1 class="font-headline font-bold text-3xl tracking-tight text-primary">Silk Fitness</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Your journey starts here.</p>
</div>
<!-- Auth Actions -->
<div class="w-full space-y-6">
<!-- Google Sign-In Button -->
<button class="w-full h-14 flex items-center justify-center gap-3 neo-surface neo-raised neo-border-radius text-primary font-semibold text-base transition-all duration-200 active:neo-inset">
<svg class="text-primary" fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor" fill-opacity="0.8"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor" fill-opacity="0.7"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor" fill-opacity="0.6"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor" fill-opacity="0.9"></path>
</svg>
                Continue with Google
            </button>
<!-- Apple Sign-In Button (Alternative) -->
<button class="w-full h-14 flex items-center justify-center gap-3 neo-surface neo-raised neo-border-radius text-on-surface font-semibold text-base transition-all duration-200 active:neo-inset">
<span class="material-symbols-outlined text-2xl">ios</span>
                Continue with Apple
            </button>
<div class="relative flex items-center justify-center my-8">
<div class="w-full h-px neo-inset bg-transparent"></div>
<span class="absolute px-4 bg-background text-on-surface-variant text-sm font-medium">or</span>
</div>
<!-- Email Sign-In Button -->
<button class="w-full h-14 flex items-center justify-center gap-3 neo-surface neo-inset neo-border-radius text-on-surface-variant font-medium text-base transition-all duration-200">
<span class="material-symbols-outlined text-xl">mail</span>
                Continue with Email
            </button>
</div>
</main>
<!-- Footer Links -->
<footer class="w-full max-w-md mt-auto pt-8 pb-4 text-center">
<p class="text-on-surface-variant text-xs font-medium px-8 leading-relaxed">
            By continuing, you agree to Silk Fitness's <br/>
<a class="text-primary hover:underline transition-all" href="#">Terms of Service</a> and 
            <a class="text-primary hover:underline transition-all" href="#">Privacy Policy</a>.
        </p>
</footer>
